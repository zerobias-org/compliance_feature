name: Publish Compliance Feature

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      compliance_feature:
        description: 'Compliance feature to publish (e.g. zerobias/f_2fa). Leave blank for all changed.'
        required: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    uses: zerobias-org/devops/.github/workflows/zbb-publish-reusable.yml@main
    with:
      ghcr-namespace: zerobias-org
      dispatch-input-name: compliance_feature
      dispatch-input-value: ${{ inputs.compliance_feature }}
    secrets: inherit
